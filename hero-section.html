<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canadian Builders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Barlow:ital,wght@0,700;0,800;0,900;1,800&display=swap" rel="stylesheet" />

  <!-- ═══════════════════════════════════════════
       CSS
  ═══════════════════════════════════════════ -->
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:    #C0272D;
  --white:  #ffffff;
  --dark:   #0d0d0d;
  --nav-h:  68px;
}

html, body {
  height: 100%;
  font-family: 'Inter', sans-serif;
  background: var(--dark);
  color: var(--white);
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  background: rgba(8,8,8,0.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.nav-logo {
  font-family: 'Barlow', sans-serif;
  font-size: 21px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--white);
  text-decoration: none;
  line-height: 1;
}
.nav-logo span { color: var(--red); }

.nav-links {
  display: flex;
  gap: 36px;
  list-style: none;
}
.nav-links a {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover,
.nav-links a.active { color: var(--white); }
.nav-links a.active { border-bottom: 2px solid var(--red); padding-bottom: 2px; }

.nav-cta {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--white);
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 8px 20px;
  transition: background 0.2s, border-color 0.2s;
}
.nav-cta:hover { background: var(--red); border-color: var(--red); }

/* ── HERO ── */
#hero {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* ── Slide stack ── */
.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: opacity;
}
.slide.active { opacity: 1; z-index: 1; }

/*
  Layer order inside each .slide (back → front):
    z-index 0  → .slide-bg-fallback  (gradient, always visible)
    z-index 1  → img                 (covers fallback when it loads)
    z-index 2  → .slide-overlay      (dark gradient on top of image)
*/

.slide-bg-fallback {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.slide img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  z-index: 1;
}

.slide-overlay {
  position: absolute;
  inset: 0;
  z-index: 2;
  background:
    linear-gradient(90deg,
      rgba(0,0,0,0.72) 0%,
      rgba(0,0,0,0.35) 55%,
      rgba(0,0,0,0.10) 100%),
    linear-gradient(0deg,
      rgba(0,0,0,0.55) 0%,
      transparent 50%);
}

/* ── CONTENT LAYER ── */
.hero-ui {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: grid;
  grid-template-columns: 1fr 1fr 180px;
  grid-template-rows: 1fr auto;
  padding-top: var(--nav-h);
}

/* ── Left: heading block ── */
.hero-text {
  grid-column: 1 / 2;
  grid-row: 1 / 2;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 64px 120px;
}

.hero-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.6s 0.1s, transform 0.6s 0.1s;
}

.hero-heading {
  font-family: 'Barlow', sans-serif;
  font-size: clamp(38px, 5.2vw, 76px);
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.01em;
  color: var(--white);
  margin-bottom: 22px;
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.7s 0.2s, transform 0.7s 0.2s;
  max-width: 640px;
}

.hero-sub {
  font-size: 15px;
  font-weight: 400;
  color: rgba(255,255,255,0.68);
  line-height: 1.7;
  max-width: 420px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.6s 0.35s, transform 0.6s 0.35s;
}

.hero-ui.visible .hero-eyebrow { opacity: 1; transform: translateY(0); }
.hero-ui.visible .hero-heading  { opacity: 1; transform: translateY(0); }
.hero-ui.visible .hero-sub      { opacity: 1; transform: translateY(0); }

.hero-text.animate-out .hero-eyebrow,
.hero-text.animate-out .hero-heading,
.hero-text.animate-out .hero-sub {
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.3s, transform 0.3s;
}
.hero-text.animate-in .hero-eyebrow { opacity: 1; transform: translateY(0); transition: opacity 0.6s 0.15s, transform 0.6s 0.15s; }
.hero-text.animate-in .hero-heading  { opacity: 1; transform: translateY(0); transition: opacity 0.7s 0.25s, transform 0.7s 0.25s; }
.hero-text.animate-in .hero-sub      { opacity: 1; transform: translateY(0); transition: opacity 0.6s 0.4s,  transform 0.6s 0.4s;  }

/* ── Right: PREV / NEXT ── */
.hero-nav {
  grid-column: 3 / 4;
  grid-row: 1 / 2;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  padding-right: 48px;
  gap: 0;
}

.hero-nav-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 12px 0;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0.7;
  transition: opacity 0.2s, color 0.2s;
}
.hero-nav-btn:hover { opacity: 1; }

.hero-nav-divider {
  width: 40px;
  height: 2px;
  background: var(--red);
  margin: 6px 0;
  align-self: flex-end;
}

/* ── Bottom bar ── */
.hero-bottom {
  grid-column: 1 / 4;
  grid-row: 2 / 3;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 64px 32px;
}

.slide-numbers {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.slide-num {
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35);
  transition: color 0.3s, font-size 0.3s;
  cursor: pointer;
  line-height: 1.4;
}
.slide-num.active {
  color: var(--white);
  font-size: 20px;
}

.hero-progress-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding-bottom: 4px;
}

.progress-track {
  width: 1px;
  height: 72px;
  background: rgba(255,255,255,0.2);
  position: relative;
  overflow: hidden;
}

.progress-fill {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 0%;
  background: var(--white);
  transition: height linear;
}

.dots-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
  border: none;
}
.dot.active {
  background: var(--white);
  transform: scale(1.5);
}

/* ── RESPONSIVE ── */
.hamburger { display: none; }

@media (max-width: 900px) {
  nav { padding: 0 24px; }
  .nav-links, .nav-cta { display: none; }
  .hamburger {
    display: flex;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--white);
    border-radius: 2px;
  }
  .hero-ui {
    grid-template-columns: 1fr 64px;
    grid-template-rows: 1fr auto;
  }
  .hero-text {
    grid-column: 1 / 2;
    padding: 0 24px 100px;
  }
  .hero-nav {
    grid-column: 2 / 3;
    padding-right: 20px;
    justify-content: flex-end;
    padding-bottom: 110px;
  }
  .hero-nav-btn { font-size: 10px; letter-spacing: 0.14em; }
  .hero-bottom {
    grid-column: 1 / 3;
    padding: 0 24px 24px;
  }
  .hero-progress-wrap { display: none; }
}

@media (max-width: 520px) {
  .hero-heading { font-size: 32px; }
  .hero-sub { font-size: 13px; }
  .hero-nav { display: none; }
}
  </style>
</head>

<body>

  <!-- ═══════════════════════════════════════════
       HTML
  ═══════════════════════════════════════════ -->

  <!-- NAV -->
  <nav>
    <a href="#" class="nav-logo">Canadian<span>Builders</span></a>
    <ul class="nav-links">
      <li><a href="#">About Us</a></li>
      <li><a href="#" class="active">Projects</a></li>
      <li><a href="#">Engineering</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Safety</a></li>
      <li><a href="#">Leadership</a></li>
    </ul>
    <a href="#" class="nav-cta">Contact</a>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- HERO -->
  <section id="hero">

  
    <div class="slide active" data-index="0">
      <img
        src="./image/image-1004-2.jpg"
        alt="Downtown Toronto Mixed-Use Tower"
        onerror="this.style.display='none'"
      />
      <!-- Gradient fallback (visible when image path can't resolve) -->
      <div class="slide-bg-fallback" style="background: linear-gradient(135deg,#1a2530 0%,#0a1520 100%);"></div>
      <div class="slide-overlay"></div>
    </div>

    <div class="slide" data-index="1">
      <img
        src="./image/image-1004-3.jpg"
        alt="Vancouver Waterfront Residences"
        onerror="this.style.display='none'"
      />
      <div class="slide-bg-fallback" style="background: linear-gradient(135deg,#1a1a2a 0%,#0a0a18 100%);"></div>
      <div class="slide-overlay"></div>
    </div>

    <div class="slide" data-index="2">
      <img
        src="./image/image-1006-2.jpg"
        alt="Calgary Corporate Campus"
        onerror="this.style.display='none'"
      />
      <div class="slide-bg-fallback" style="background: linear-gradient(135deg,#201a18 0%,#120a08 100%);"></div>
      <div class="slide-overlay"></div>
    </div>

    <div class="slide" data-index="3">
      <img
        src="./image/image-1005-2.jpg"
        alt="Ottawa Federal Complex"
        onerror="this.style.display='none'"
      />
      <div class="slide-bg-fallback" style="background: linear-gradient(135deg,#181820 0%,#0a0a12 100%);"></div>
      <div class="slide-overlay"></div>
    </div>

    <!-- ── CONTENT UI (sits above all slides) ── -->
    <div class="hero-ui visible" id="heroUI">

      <!-- Left text -->
      <div class="hero-text animate-in" id="heroText">
        <p class="hero-eyebrow" id="heroEyebrow">Award-Winning Construction</p>
        <h2 class="hero-heading" id="heroHeading">Our story goes<br>beyond construction</h2>
        <p class="hero-sub"   id="heroSub">Canada's leading engineering and construction group — building landmarks that define skylines and communities coast to coast.</p>
      </div>

      <!-- Right nav -->
      <div class="hero-nav">
        <button class="hero-nav-btn" id="prevBtn" aria-label="Previous slide">PREV.</button>
        <div class="hero-nav-divider"></div>
        <button class="hero-nav-btn" id="nextBtn" aria-label="Next slide">NEXT</button>
      </div>

      <!-- Bottom bar -->
      <div class="hero-bottom">
        <!-- Slide number stack -->
        <div class="slide-numbers" id="slideNums"></div>

        <!-- Vertical progress line -->
        <div class="hero-progress-wrap">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <!-- Dots -->
        <div class="dots-row" id="dotsRow"></div>
      </div>

    </div><!-- /hero-ui -->

  </section>


  <!-- ═══════════════════════════════════════════
       JAVASCRIPT HERO 
  ═══════════════════════════════════════════ -->
  <script>
    (() => {
      /* ── Config ── */
      const INTERVAL = 5000;   // ms between auto-advances

      /* Slide content per index */
      const SLIDES = [
  {
    eyebrow: 'Award-Winning Construction',
    heading: 'Our story goes<br>beyond construction',
    sub: "Canada's leading engineering and construction group — building landmarks that define skylines and communities coast to coast.",
  },
  {
    eyebrow: 'Landmark Projects',
    heading: 'Engineering excellence<br>at every scale',
    sub: 'From waterfront residences to federal institutions — we deliver precision-built structures that stand the test of time.',
  },
  {
    eyebrow: 'Nationwide Reach',
    heading: "Building Canada's<br>future, together",
    sub: 'Over 25 years of experience across residential, commercial, and public-sector projects in every province.',
  },
  {
    eyebrow: 'Trusted Partners',
    heading: 'Integrity built <br> into every foundation',
    sub: 'Our partnerships with government agencies, developers, and communities drive outcomes that matter.',
  },
];

      /* ── DOM refs ── */
      const slides      = document.querySelectorAll('.slide');
      const heroText    = document.getElementById('heroText');
      const eyebrowEl   = document.getElementById('heroEyebrow');
      const headingEl   = document.getElementById('heroHeading');
      const subEl       = document.getElementById('heroSub');
      const progressFill= document.getElementById('progressFill');
      const slideNums   = document.getElementById('slideNums');
      const dotsRow     = document.getElementById('dotsRow');

      let current    = 0;
      let autoTimer  = null;
      let progTimer  = null;

      /* ── Build slide numbers & dots ── */
      slides.forEach((_, i) => {
        /* Number */
        const n = document.createElement('span');
        n.className = 'slide-num' + (i === 0 ? ' active' : '');
        n.textContent = String(i + 1).padStart(2, '0');
        n.addEventListener('click', () => jumpTo(i));
        slideNums.appendChild(n);

        /* Dot */
        const d = document.createElement('button');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        d.setAttribute('aria-label', `Slide ${i + 1}`);
        d.addEventListener('click', () => jumpTo(i));
        dotsRow.appendChild(d);
      });

      const numEls  = slideNums.querySelectorAll('.slide-num');
      const dotEls  = dotsRow.querySelectorAll('.dot');

      /* ── Go to slide ── */
      function goTo(index, dir) {
        const prev = current;
        current = (index + slides.length) % slides.length;

        /* Deactivate old */
        slides[prev].classList.remove('active');
        numEls[prev].classList.remove('active');
        dotEls[prev].classList.remove('active');

        /* Activate new */
        slides[current].classList.add('active');
        numEls[current].classList.add('active');
        dotEls[current].classList.add('active');

        /* Animate text out → swap content → in */
        heroText.classList.remove('animate-in');
        heroText.classList.add('animate-out');

        setTimeout(() => {
          const s = SLIDES[current];
          eyebrowEl.textContent  = s.eyebrow;
          headingEl.innerHTML    = s.heading;
          subEl.textContent      = s.sub;

          heroText.classList.remove('animate-out');
          heroText.classList.add('animate-in');
        }, 320);

        /* Progress bar */
        restartProgress();
      }

      function jumpTo(i) {
        if (i === current) return;
        stopAuto();
        goTo(i);
        startAuto();
      }

      /* ── Auto play ── */
      function startAuto() {
        stopAuto();
        autoTimer = setInterval(() => goTo(current + 1), INTERVAL);
      }

      function stopAuto() {
        clearInterval(autoTimer);
      }

      /* ── Progress bar ── */
      function restartProgress() {
        clearTimeout(progTimer);
        progressFill.style.transition = 'none';
        progressFill.style.height     = '0%';
        void progressFill.offsetWidth;
        progressFill.style.transition = `height ${INTERVAL}ms linear`;
        progressFill.style.height     = '100%';
      }

      /* ── Buttons ── */
      document.getElementById('prevBtn').addEventListener('click', () => {
        stopAuto(); goTo(current - 1); startAuto();
      });
      document.getElementById('nextBtn').addEventListener('click', () => {
        stopAuto(); goTo(current + 1); startAuto();
      });

      /* ── Keyboard ── */
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft')  { stopAuto(); goTo(current - 1); startAuto(); }
        if (e.key === 'ArrowRight') { stopAuto(); goTo(current + 1); startAuto(); }
      });

      /* ── Touch swipe ── */
      let tx = 0;
      const hero = document.getElementById('hero');
      hero.addEventListener('touchstart', e => { tx = e.changedTouches[0].clientX; }, { passive: true });
      hero.addEventListener('touchend',   e => {
        const dx = e.changedTouches[0].clientX - tx;
        if (Math.abs(dx) < 40) return;
        stopAuto();
        goTo(dx < 0 ? current + 1 : current - 1);
        startAuto();
      });

      /* ── Pause on hover ── */
      hero.addEventListener('mouseenter', () => {
        stopAuto();
        progressFill.style.transition = 'none';
      });
      hero.addEventListener('mouseleave', () => {
        startAuto();
        restartProgress();
      });

      /* ── Init ── */
      startAuto();
      restartProgress();
    })();
  </script>

</body>
</html>
